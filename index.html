<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="Rezepte"/>
  <meta name="theme-color" content="#1D9E75"/>
  <link rel="manifest" href="./manifest.json"/>
  <link rel="apple-touch-icon" href="./icons/icon-192.png"/>
  <title>Rezepte</title>
  
  <!-- CSS -->
  <link rel="stylesheet" href="./css/main.css"/>
  <link rel="stylesheet" href="./css/components.css"/>
  <link rel="stylesheet" href="./css/responsive.css"/>
</head>
<body>

<!-- Header -->
<div class="header" id="header">
  <button class="header-back" id="btn-back" style="display:none" onclick="goBack()">←</button>
  <span class="header-title" id="header-title">🍲 Rezepte</span>
  <span class="header-badge" id="header-badge">0</span>
</div>

<!-- Screen: Liste -->
<div class="screen active" id="screen-list">
  <div class="list-container" id="list-container">
    <div class="loading">Rezepte werden geladen…</div>
  </div>
  <div class="fab-bar" id="fab-bar">
    <button class="fab-btn fab-btn-secondary" onclick="clearSelection()">Auswahl löschen</button>
    <button class="fab-btn fab-btn-primary" onclick="showShopping()">🛒 Einkaufsliste</button>
  </div>
</div>

<!-- Screen: Detail -->
<div class="screen" id="screen-detail">
  <div class="detail-container" id="detail-container"></div>
</div>

<!-- Screen: Einkaufsliste -->
<div class="screen" id="screen-shopping">
  <div class="shopping-container" id="shopping-container"></div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- JavaScript -->
<script src="./js/data.js"></script>
<script src="./js/app.js"></script>
<script src="./js/ui.js"></script>
<script src="./js/navigation.js"></script>
<script src="./js/utils.js"></script>

</body>
</html>
